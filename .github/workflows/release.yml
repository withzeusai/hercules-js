name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # zizmor: ignore[artipacked] persist-credentials is required so
          # changesets/action can push the version-packages PR with
          # HERCULES_BOT_TOKEN. This job does not upload artifacts, so the
          # token cannot leak via that path.
          token: ${{ secrets.HERCULES_BOT_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: package.json
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Set up Git user
        run: |
          git config user.name "hercules-bot[bot]"
          git config user.email "hercules-bot@users.noreply.github.com"

      - name: Create release PR or publish
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset:version
          title: "chore: version packages"
          commit: "chore: version packages"
          setupGitUser: false
          commitMode: "git-cli"
        env:
          GITHUB_TOKEN: ${{ secrets.HERCULES_BOT_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
