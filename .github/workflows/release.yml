name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # zizmor: ignore[artipacked] persist-credentials is required so
          # changesets/action can push the version-packages PR with
          # HERCULES_BOT_TOKEN. This job does not upload artifacts, so the
          # token cannot leak via that path.
          token: ${{ secrets.HERCULES_BOT_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Set up Git user
        run: |
          git config user.name "hercules-bot[bot]"
          git config user.email "hercules-bot@users.noreply.github.com"

      - name: Create release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset:version
          title: "chore: version packages"
          commit: "chore: version packages"
          setupGitUser: false
          commitMode: "git-cli"
        env:
          GITHUB_TOKEN: ${{ secrets.HERCULES_BOT_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
